# frugal-vibe.conf
#
# This file controls which AI model and provider your tools use.
# Edit it in any text editor — no coding required.
#
# API keys do NOT go here. They belong in your shell environment:
#   Mac/Linux: add  export ANTHROPIC_API_KEY=your-key  to ~/.zshrc
#   Windows:   set via System > Advanced system settings > Environment Variables
#
# For personal overrides, create frugal-vibe.conf.local in this same folder.
# That file is gitignored and will never be committed.

# ---------------------------------------------------------------------------
# Model provider
# Which AI service to use. Start with ollama — it's free and runs locally.
# Switch to anthropic or openai only when you're ready to use a paid model.
#
# Options: ollama | anthropic | openai
# ---------------------------------------------------------------------------
MODEL_PROVIDER=ollama

# ---------------------------------------------------------------------------
# Local model
# Which Ollama model to use. qwen3:8b is the recommended starting point —
# it handles general questions, product thinking, and code on ordinary hardware.
#
# Other options: qwen2.5-coder:7b (code-focused, optional upgrade)
# Browse all models at: https://ollama.com/library
# ---------------------------------------------------------------------------
LOCAL_MODEL=qwen3:8b

# ---------------------------------------------------------------------------
# Paid model
# Which model to use when MODEL_PROVIDER is set to anthropic or openai.
# Defaults to the cheapest available option for each provider.
#
# Anthropic options: claude-haiku-4-5 | claude-sonnet-4-6 | claude-opus-4-6
# OpenAI options:    gpt-4o-mini | gpt-4o
# ---------------------------------------------------------------------------
PAID_MODEL=claude-haiku-4-5
